SB_CONFIG_MATTER=y

# XIAO nRF54L15 has no external flash — keep secondary OTA slot in internal RRAM
SB_CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=n
SB_CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=n

# Compressed image support allows secondary slot to be smaller than primary
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y
SB_CONFIG_MCUBOOT_COMPRESSED_IMAGE_SUPPORT=y