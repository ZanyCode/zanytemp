#
# Per-device overrides for the second unit (ZANYTEMP-002).
#
# Build with:
#   west build -- -DEXTRA_CONF_FILE=device2.conf
# or for release:
#   west build -DFILE_SUFFIX=release -- -DEXTRA_CONF_FILE=device2.conf
#

# Unique BLE discriminator (must differ from device 1's 0xF00 = 3840)
CONFIG_CHIP_DEVICE_DISCRIMINATOR=0xF01

# Unique serial number
CONFIG_CHIP_DEVICE_SERIAL_NUMBER="ZANYTEMP-002"

# Distinct BLE advertisement name (helps identify device in logs/apps)
CONFIG_BT_DEVICE_NAME="MatterTemp2"
